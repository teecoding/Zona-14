# _Zona14: compatibility aliases for vanilla emote ids that the fork commented
# out in speech_emotes.yml. Many EmoteSoundsPrototype and EntityPrototype
# definitions still reference them, so we re-declare the ids as minimal
# prototypes to keep prototype validation happy. Gameplay-side chat triggers
# live on the ST* variants in _Stalker/Emotes/speech.yml.

# --- Vocal ---
- type: emote
  id: Scream
  name: chat-emote-name-scream
  category: Vocal
  available: false

