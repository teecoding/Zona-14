# _Zona14: compatibility stBand prototypes for ids that are still referenced
# by jobs, mob spawners and PDA messenger channels but were never added as
# proper band definitions. Each is a minimal entry with a single hierarchy
# rank so the validator can resolve the ProtoId.

- type: stBand
  id: STAnomalistsBand
  name: Anomalists
  factionId: Stalker
  maxMembers: 5
  hierarchy:
    1: StalkerAnomalist
    2: StalkerAnomalistGuardian

