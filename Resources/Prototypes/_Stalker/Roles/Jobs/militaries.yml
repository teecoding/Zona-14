- type: job
  id: MilitaryStalker
  name: job-military-stalker
  icon: army
  description: job-military-stalker-desc
  playTimeTracker: JobMilitaryStalker
  whitelisted: true
  requirements:
    # - !type:RoleTimeRequirement
    #   role: JobMilitaryStalker
    #   time: 1
    - !type:SpeciesRequirement
      species:
      - Human
      - Dwarf
  startingGear: MilitarySpecGear
  supervisors: job-military-stalker-supervisor
  canBeAntag: false
  special:
    - !type:AddComponentSpecial
      components:
      - type: Access
        groups:
          - MilitaryStalker
      - type: Bands
        altBand: stalker
        canChange: true
        band: Stalker
        bandIcon: army
      - type: BlockTackingHolyItems
      - type: TeethPull
        teethProto: ToothStalker
        pullingItemTag: PliersStalker
        teethCount: 3
        initialTeeth: 3
      - type: NpcFactionMember
        factions:
        - MilitaryStalker
      - type: STAnomalyTipsViewing
      - type: Vocal # stalker EN change start
        sounds:
          Male: MaleHumanMilitary
          Female: FemaleHumanMilitary
          Unsexed: MaleHumanMilitary # stalker EN change end

