- type: htnCompound
  id: STWardenCompound
  branches:
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:UnPullOperator
        preconditions:
          - !type:PulledPrecondition
            isPulled: true

    - tasks:
      - !type:HTNCompoundTask
        task: STWardenMeleeCombatCompound

      - !type:HTNCompoundTask
        task: IdleCompound

- type: htnCompound
  id: STWardenMeleeCombatCompound
  branches:
    # Move to melee range and hit them
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:UtilityOperator
          proto: NearbyMeleeTargets

      - !type:HTNCompoundTask
        task: STWardenMeleeAttackTargetDetectionCompound
      
- type: htnCompound
  id: STWardenMeleeAttackTargetDetectionCompound
  branches:
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: AttackDelay
          amount: 1.5
          
      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: AttackDelay
        preconditions:
          - !type:KeyExistsPrecondition
            key: AttackDelay

      - !type:HTNCompoundTask
        task: STWardenMeleeAttackTargetCompound



- type: htnCompound
  id: STWardenMeleeAttackTargetCompound
  branches:
    # Move to melee range and hit them
    - tasks:
      - !type:HTNPrimitiveTask
        preconditions:
          - !type:KeyExistsPrecondition
            key: Target
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: MeleeRange

      - !type:HTNPrimitiveTask
        operator: !type:MeleeOperator
          targetKey: Target
        preconditions:
          - !type:KeyExistsPrecondition
            key: Target
          - !type:TargetInRangePrecondition
            targetKey: Target
            rangeKey: MeleeRange
        services:
          - !type:UtilityService
            id: MeleeService
            proto: NearbyMeleeTargets
            key: Target
