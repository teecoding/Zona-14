- type: entity
  parent: BaseMobMutant
  id: MobMutantNosach
  name: Вурдалак
  suffix: ST, T3
  description: во многих народных мифах и сказаниях упоминаются вурдалаки — покойники, встающие по ночам из могилы, вредящие людям и скоту. На деле лишь еще один из многих малоизвестных, редких мутантов, которые ведут чаще ночной образ жизни. Однако из-за голода они способны выходить из своих гнезд даже днем.
  components:
    - type: EmitSoundOnSpawn
      sound:
        path: /Audio/_Stalker/Mutants/giant_threaten_1.ogg
        params:
          volume: 1
          maxDistance: 20
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/_Stalker/Mutants/nosach/Nosach_movement_0.ogg
        params:
          volume: -999999
    - type: Butcherable
      spawned:
        - id: MutantPartZombieHand
    - type: Damageable
      damageModifierSet: STMutantT3DamageModifierSet
    - type: DamageStateVisuals
      states:
        Alive:
          Base: nosach
        Critical:
          Base: dead
        Dead:
          Base: dead
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 350
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                path: /Audio/_Stalker/Mutants/nosach/Nosach_death_1.ogg
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.25
          density: 800
          mask:
            - MobMask
          layer:
            - MobLayer
    - type: Jumpscare
      chargeDamage:
        types:
          Blunt: 20
          Slash: 15
      jumpPower: 7
      jumpDistance: 15
      updateCooldown: 0.9
      #totalSteps: 3 # Stalker-TODO: This field exists in component but is not a datafield!
      #stepInterval: 0.025 # Stalker-TODO: This field exists in component but is not a datafield!
    - type: MobThresholds
      thresholds:
        0: Alive
        350: Dead
    - type: MeleeWeapon
      attackRate: 0.7
      angle: 50
      range: 1.8
      soundHit:
        path: /Audio/_Stalker/Mutants/nosach/Nosach_attack_1.ogg
        params:
          variation: 0.125
      animation: WeaponArcClaw
      wideAnimation: WeaponArcClaw
      damage:
        types:
          Slash: 25
          Blunt: 5
    - type: BonusMeleeDamage
      heavyDamageMultiplier: 1.25
    - type: MovementSpeedModifier
      baseWalkSpeed: 1.4
      baseSprintSpeed: 2.4
    - type: Sprite
      sprite: /Textures/_Stalker/Mobs/Mutants/Nosach.rsi
      layers:
        - map: ["enum.DamageStateVisualLayers.Base"]
          state: nosach
    - type: SlowOnDamage
      speedModifierThresholds:
        280: 0.7
    - type: StaminaDamageOnHit
      damage: 30
    - type: STWeight
      self: 100
