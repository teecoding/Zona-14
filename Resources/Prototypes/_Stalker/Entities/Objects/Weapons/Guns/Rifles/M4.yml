- type: entity
  abstract: true
  parent: STBaseWeaponRifle
  id: STBaseWeaponRifleM4
  components:
  - type: STWeight
    self: 3.5
  - type: PullDoAfter
    pullTime: 3.5
  - type: GunWieldBonus
    minAngle: -45
    maxAngle: -40
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/m4.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/m4.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/m4.rsi
    equipDelay: 2
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/m4.ogg
      params:
        volume: -2
    minAngle: 50
    maxAngle: 85
    fireRate: 6
    angleIncrease: 1.5
    angleDecay: 5.5
    projectileSpeed: 60
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_auto_sear: !type:ContainerSlot {}
      gun_module_muzzle: !type:ContainerSlot {}
      gun_module_scope: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base556Mag10
        insertSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Stalker/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 5
        whitelist:
          tags:
          - Magazine556
      gun_auto_sear:
        name: Insides
        priority: 4
        whitelist:
          tags:
          - STModuleAutoSear
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModuleRifleSilencerNato
      gun_module_scope:
        name: Scope
        priority: 2
        whitelist:
          tags:
          - STWeaponModuleRifleScopeNato
      gun_chamber:
        name: Chamber
        startingItem:
        priority: 1
        whitelist:
          tags:
          - STCartridge556
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.46

- type: entity
  parent: STBaseWeaponRifleM4
  id: STWeaponRifleM4
  name: Colt M4 "Cobra"
  description: American assault rifle that became an icon of modern warfare. Appears in the Zone with western mercenaries and military expeditions. Lightweight, accurate and reliable in any conditions.

- type: entity
  parent: STBaseWeaponRifleM4
  id: STWeaponRifleHK416
  name: HK416
  suffix: ST, Кастомка
  description: German M4 upgrade with G36's gas system. Considered a weapon of true professionals in the Zone - silent and lethal. Rumored to use special armor-piercing rounds.
  components:
  - type: STWeight
    self: 3
  - type: PullDoAfter
    pullTime: 3
  - type: GunWieldBonus
    minAngle: -48
    maxAngle: -50
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/hk416.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/hk416.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/hk416.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/m4.ogg
      params:
        volume: -2
    minAngle: 50
    maxAngle: 95
    fireRate: 8
    angleIncrease: 1.2
    angleDecay: 6
    projectileSpeed: 60
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.7
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.46

- type: entity
  parent: STBaseWeaponRifleM4
  id: STWeaponRifleLR300v1
  name: LR-300
  description: Лёгкая винтовка с дальностью эффективного огня до 300 метров. Благодаря исключительно ровному спуску, высокой эргономике и небольшому весу данное оружие отличается высокой точностью боя, хотя высокая чувствительность к загрязнению делает её не всегда пригодной для использования в сложных полевых условиях.
  components:
  - type: STWeight
    self: 3.3
  - type: PullDoAfter
    pullTime: 2
  - type: GunWieldBonus
    minAngle: -45
    maxAngle: -50
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/lr-300.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/lr-300.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/lr-300.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/t_lr300_shot.ogg
    minAngle: 45
    maxAngle: 85
    fireRate: 7
    angleIncrease: 1.3
    angleDecay: 7
    projectileSpeed: 60
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.45

- type: entity
  parent: STWeaponRifleLR300v1
  id: STWeaponRifleLR300v2
  name: LR-300
  description: Новая ступень в развитии семейства знаменитой М-16. Благодаря исключительно ровному спуску, высокой эргономике и небольшому весу данное оружие отличается высокой точностью боя, хотя высокая чувствительность к загрязнению делает его малопригодным для использования в сложных условиях.
  components:
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/_Skins/lr-300-alt.rsi
