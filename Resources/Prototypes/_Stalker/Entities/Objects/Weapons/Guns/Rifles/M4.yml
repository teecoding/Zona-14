    sprite: _Stalker/Objects/Weapons/Guns/Rifles/_Skins/lr-300-alt.rsi
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Rifles/_Skins/lr-300-alt.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/n_lr300_shot.ogg

