- type: entity
  name: TEC-9
  parent: STBaseWeaponPistol
  id: WeaponStalkerPistolTec9
  description: самозарядный пистолет, разработанный в Швеции, в 1980-х годах и выпущенный на рынок в 1984-м году.
  suffix: ST
  components:
  - type: STWeight
    self: 1
  - type: PullDoAfter
    pullTime: 0.5
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker/Objects/Weapons/Guns/Pistols/tec-9.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    projectileSpeed: 45
    minAngle: 8
    maxAngle: 15
    angleIncrease: 1
    angleDecay: 4
    fireRate: 7
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: BaseTEC9Mag
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 3
        whitelist:
          tags:
            - MagazineTEC
      gun_auto_sear:
        name: Insides
        priority: 2
        whitelist:
          tags:
            - STModuleAutoSear
      gun_chamber:
        name: Chamber
        startingItem: STCartridge919PSOGJ
        priority: 1
        whitelist:
          tags:
            - STCartridge919
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_auto_sear: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}
  - type: STWeaponDamageFalloff
    falloffMultiplier: 1.4
  - type: STWeaponAccuracy
    accuracyMultiplier: 1.4
