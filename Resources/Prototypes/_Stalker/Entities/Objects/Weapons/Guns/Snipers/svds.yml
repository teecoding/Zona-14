- type: entity
  parent: STBaseWeaponRifleSVDS
  id: STWeaponSniperSVUTop
  name: СВУ "Топь"
  suffix: ST, Кастомка
  description: Снайперская винтовка укороченная — самозарядная снайперская винтовка компоновки булл-пап, разработанная ЦКИБ СОО на основе СВД. Разработка предназначенной для воздушно-десантных войск СССР укороченной снайперской винтовки на базе СВД началась в ЦКИБ СОО в 1977 году. В 1979 году демонстрационные образцы винтовки СВУ конструктора Л. В. Бондарева были предложены частям ВДВ, однако до их производства дело тогда не дошло. В 1991 году было начато серийное производство СВУ, первые серийные винтовки поступили на вооружение 106-й гвардейской воздушно-десантной дивизии, где они прошли войсковые испытания. Ствол оснащён массивным маскирующим дульным устройством, разработанным конструктором Л. В. Бондарёвым. Глушитель обеспечивает снижение уровня звука выстрела на 10-12 % по сравнению с СВД, практически полностью устраняет дульное пламя и рассеивает звук выстрела таким образом, что определить точную позицию стрелка становится невозможным. Фурнитура выполнена из полиамида. У данного образца подавляющая часть корпуса, включая приклад, обмотана камуфляжной лентой, а на прицеле и дульном устройстве намотана дополнительная обмотка, разбивающая силуэт оружия на фоне растительности.
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/SVU/Top.rsi