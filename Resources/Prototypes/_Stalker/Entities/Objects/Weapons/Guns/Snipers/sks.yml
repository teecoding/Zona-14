- type: entity
  abstract: true
  parent: STBaseWeaponSniper
  id: STBaseWeaponSniperSKS
  components:
  - type: STWeight
    self: 4
  - type: PullDoAfter
    pullTime: 3
  - type: GunWieldBonus
    minAngle: -50
    maxAngle: -45
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/sks.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/sks.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/sks.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/sks_shoot.ogg
    minAngle: 55
    maxAngle: 110
    fireRate: 3
    angleIncrease: 3
    angleDecay: 20
    projectileSpeed: 70
  - type: BallisticAmmoProvider
    capacity: 10
    whitelist:
      tags:
      - STCartridge739
  - type: STWeaponDamageFalloff
    falloffMultiplier: 0.8
  - type: STWeaponAccuracy
    accuracyMultiplier: 3

- type: entity
  parent: STBaseWeaponSniperSKS
  id: STWeaponSniperSKS
  name: SKS Carbine
  description: The Simonov self-loading carbine chambered in 7.62x39mm with fixed 10-round magazine. Offers powerful caliber at low cost, though with certain limitations in Zone conditions.

  components:
    - type: STItemUpgrades
      tree: STSniperUpgradeTreeT3
    - type: STWeaponDurability
      maxDurability: 120
      currentDurability: 120
      durabilityLossPerShot: 0.26
      canJam: true
- type: entity
  parent: STBaseWeaponSniperSKS
  id: STWeaponSniperSKSpersecutor
  name: Преследователь
  description: Винтовка Мондрагона, переделанная и модифицированная под калибр СКС. Перекрашена в чёрныЙ, а на стволе неизвестного происхождения зарубки.
  components:
  - type: Clothing
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/persecutor.rsi
  - type: Item
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/persecutor.rsi
  - type: Sprite
    sprite: _Stalker/Objects/Weapons/Guns/Snipers/persecutor.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker/Effects/Guns/sks_shoot.ogg
    minAngle: 52
    maxAngle: 110
    fireRate: 4
    angleIncrease: 3
    angleDecay: 15
    projectileSpeed: 70
  - type: STItemUpgrades
