- type: entity
  parent: BaseBoardEntity
  id: SwampMap
  name: Карта болота
  description: Карта небольшого участка зоны, вырванная из какого-то атласа. Чтобы рассмотреть карту, лучше положить её на землю.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Other/Maps/swampmap.rsi
    state: swampmap
  - type: TabletopGame
    boardName: Карта
    size: 2479, 2249
    isMap: true
    setup:
      !type:TabletopEmptySetup
      boardPrototype: SwampMapTabletop

- type: entity
  id: SwampMapTabletop
  name: Карта болота
  parent: BaseBoardTabletop
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Other/Maps/swampmap_tabletop.rsi
    state: swampmap_tabletop

