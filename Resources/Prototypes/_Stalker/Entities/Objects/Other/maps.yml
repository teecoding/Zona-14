      enum.TopographyMapUIKey.Key:
        type: TopographyMapBoundUserInterface
  - type: TopographyMap
    mapTexturePath: _Stalker/Objects/Other/Maps/maptextures/swampmap_tabletop.png
    mapTextureName: swamp-button-name

