- type: entity
  parent: BaseItem
  id: KordonMapStack
  name: Стопка карт кордона
  description: Упаковка, содержащая карты севера и юга кордона.
  components:
  - type: Sprite
    sprite: _Stalker/Objects/Other/Maps/kordonmapstack.rsi
    state: kordonmapstack
  - type: SpawnItemsOnUse
    items:
      - id: KordonNorthMap
      - id: KordonSouthMap
    sound:
      path: /Audio/Effects/unwrap.ogg