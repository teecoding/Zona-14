- type: entity
  abstract: true
  parent: STClothingHeadBase
  id: STClothingHeadHelmetCombatT2Base
  name: база боевого шлема T2
  suffix: ST, T2, Combat
  components:
  - type: STWeight
    self: 2.1
  - type: Craftable
  - type: Armor
    armorClass: 2
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.80
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Reflect
    reflectProb: 0.08
    spread: 360
    reflects:
      - NonEnergy
    soundOnReflect: /Audio/_Stalker/Effects/sear.ogg
  - type: HideLayerClothing
    slots:
    - Hair

- type: entity
  parent: STClothingHeadHelmetCombatT2Base
  id: ClothingHeadHelmetInfantry
  name: шлем «Восток»
  description: Пехотный шлем марки «Восток» второго класса защиты, производитель неизвестен.
  components:
    - type: Sprite
      sprite: _Stalker/Objects/Clothing/Head/pehhelm_stal.rsi
    - type: Clothing
      sprite: _Stalker/Objects/Clothing/Head/pehhelm_stal.rsi

