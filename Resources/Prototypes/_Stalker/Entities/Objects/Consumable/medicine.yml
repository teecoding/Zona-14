
- type: entity
  parent: BaseItem
  id: BaseHealingItemStalker
  abstract: true
  components:
  - type: STBulkBuyable # stalker-14-en
    maxQuantity: 10
  - type: Trash
    time: 900
  - type: RepositoryItem
    categoryName: Медицина
  - type: Sprite
    sprite: _Stalker/Objects/Counsumable/Medicine/newmed.rsi
  # Inherited
  - type: Item
    size: Small
    sprite: _Stalker/Objects/Counsumable/Medicine/newmed.rsi
    shape:
      - 0,0,0,0

- type: reagent
  id: antirad
  name: reagent-name-antirad
  group: Medicine
  desc: reagent-desc-antirad
  physicalDesc: reagent-physical-desc-salvation
  flavor: salvation
  color: "#AE0101"
  boilingPoint: 212.0
  meltingPoint: 170.0
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          types:
            Radiation: -0.75
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: antirad
          min: 31
        damage:
          types:
            Asphyxiation: 0.75
            Poison: 1.5
      - !type:Jitter
        conditions:
        - !type:ReagentCondition
          reagent: antirad
          min: 31

####################################

- type: entity
  id: antiradpill
  parent: BaseItem
  name:  таблетка
  suffix: Stalker
  description: спобна вас вылечить... или убить, как повезёт.
  components:
  - type: Tag
    tags:
      - Pill
  - type: Item
    size: Tiny
    sprite: _Stalker/Objects/medicine.rsi # Stalker-TODO: Need an inhand sprite for this item
  - type: RepositoryItem
    categoryName: Медицина
  - type: Sprite
    sprite: _Stalker/Objects/medicine.rsi
    scale: 0.6, 0.6
    state: antirad
  - type: Edible
    forceFeedDelay: 1
    transferAmount: null
    edible: Pill
  - type: BadFood
  - type: FlavorProfile
    ignoreReagents: []
  - type: SolutionSpiker
    sourceSolution: food
  - type: DeleteOnTrigger
  - type: Extractable
    grindableSolutionName: food
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:SpillBehavior
        solution: food
        #transferForensics: true  # Stalker-TODO: This field does not exist!
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: antirad
          Quantity: 10

