# City contract board set for supported execution modes.

- type: storeContractPack
  id: TradeContractsCityPack
  contracts:
  - id: trade_contract_ZoneArtifactVyvert
    weight: 100
  - id: trade_contract_ArtMedusa
    weight: 100
  - id: trade_contract_MutantPartFleshEye
    weight: 100
  - id: trade_contract_MutantPartBlindDogTail
    weight: 100
  - id: trade_contract_delivery_BoxCrate
    weight: 100
  - id: trade_contract_recovery_BoxCrate
    weight: 100
  - id: trade_contract_hunt_old_boar
    weight: 75

- type: storeContractsPreset
  id: TradeContractsCityPreset
  limits:
    Easy: 3
    Medium: 2
    Hard: 1
  packs:
  - id: TradeContractsCityPack
    weight: 1

# ----------------------------
# Regular delivery
# ----------------------------

- type: storeContract
  id: trade_contract_ZoneArtifactVyvert
  name: "Добудь Выверт"
  description: "Нужен выверт для мази. А то спина болит у уважаемого Жабы."
  difficulty: Easy
  targets:
  - id: ZoneArtifactVyvert
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

- type: storeContract
  id: trade_contract_ArtMedusa
  name: "Добудь Медузу"
  description: "Нужна медуза для ожерелья. Зарю не забудь одеть."
  difficulty: Easy
  targets:
  - id: ArtMedusa
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

- type: storeContract
  id: trade_contract_MutantPartFleshEye
  name: "Глаз Плоти"
  description: "Глаза Плоти для борща. Вкусно пальчики оближешь."
  difficulty: Easy
  targets:
  - id: MutantPartFleshEye
    required: { min: 2, max: 4 }
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

- type: storeContract
  id: trade_contract_MutantPartBlindDogTail
  name: "Хвосты слепых псов"
  description: "Хвосты собак на лекарство."
  difficulty: Easy
  targets:
  - id: MutantPartBlindDogTail
    required: { min: 2, max: 4 }
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
