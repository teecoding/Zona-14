# City contract board set for supported execution modes.

- type: storeContractPack
  id: TradeContractsCityPack
  contracts:
  - id: trade_contract_delivery_basic_copper
    weight: 100
  - id: trade_contract_delivery_tracked_copper
    weight: 100
  - id: trade_contract_delivery_structure_to_store_crate
    weight: 100
  - id: trade_contract_delivery_structure_to_dropoff_crate
    weight: 100
  - id: trade_contract_hunt_ghoul
    weight: 100
  - id: trade_contract_repair_generator
    weight: 100
  - id: trade_contract_ghost_raider
    weight: 100
  - id: trade_contract_repair_generator_legacy_store
    weight: 100
  - id: trade_contract_ghost_raider_legacy_store
    weight: 100

- type: storeContractsPreset
  id: TradeContractsCityPreset
  limits:
    Easy: 9
  packs:
  - id: TradeContractsCityPack
    weight: 1

# ----------------------------
# Regular delivery
# ----------------------------
- type: storeContract
  id: trade_contract_delivery_basic_copper
  name: "Поставка медного слитка"
  description: "Заказ на медь. Слиток для наводки может появиться на шахтной точке или на складе, но для сдачи подойдёт любой такой же слиток."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    spawnPointTags:
    - tag: TradeContractMineSpawn
      weight: 4
    - tag: TradeContractStoreSpawn
      weight: 1
    deliverySpawnPrototype: STCraftSheetCopperT1
  targets:
  - id: STCraftSheetCopperT1
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 20, max: 35 }

# ----------------------------
# Tracked delivery
# ----------------------------
- type: storeContract
  id: trade_contract_delivery_tracked_copper
  name: "Помеченный медный слиток"
  description: "Один из помеченных слитков затерялся между шахтой и складом. Найдите его и сдайте именно этот груз."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    spawnPointTags:
    - tag: TradeContractMineSpawn
      weight: 5
    - tag: TradeContractStoreSpawn
      weight: 1
    targetPrototype: STCraftSheetCopperT1
    guardPrototype: MobBanditSecurityLow
    guardCount: 1
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: STCraftSheetCopperT1
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 35, max: 60 }

# ----------------------------
# Structure delivery to store
# ----------------------------
- type: storeContract
  id: trade_contract_delivery_structure_to_store_crate
  name: "Вывезти стальной ящик с шахты"
  description: "Стальной ящик появится на одной из шахтных грузовых точек. Дотащите его до торгового автомата целым. Если груз уничтожат, заказ будет сорван."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    spawnPointTags:
    - tag: TradeContractMineSpawn
      weight: 5
    - tag: TradeContractStructureSpawn
      weight: 2
    targetPrototype: CrateGenericSteel
    allowStoreWorldTurnIn: true
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: CrateGenericSteel
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 55, max: 90 }

# ----------------------------
# Structure delivery to dropoff
# ----------------------------
- type: storeContract
  id: trade_contract_delivery_structure_to_dropoff_crate
  name: "Доставить стальной ящик на шахту"
  description: "Стальной ящик появится возле торгового автомата. Доставьте его на одну из шахтных точек целым, заберите накладную о приёмке и принесите её обратно за оплатой."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    targetPrototype: CrateGenericSteel
    proofPrototype: NcTradeContractProofDeliveryReceipt
    spawnAtStore: true
    dropoffPointTags:
    - tag: TradeContractMineSpawn
      weight: 4
    - tag: TradeContractStructureDropoff
      weight: 1
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: CrateGenericSteel
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 55, max: 90 }

# ----------------------------
# Hunt objective
# ----------------------------
- type: storeContract
  id: trade_contract_hunt_ghoul
  name: "Контракт на голову гуля"
  description: "В окрестностях шахты заметили дикого гуля. Найдите цель, устраните её, подберите трофейную метку с тела и принесите её к доске за оплатой."
  difficulty: Easy
  repeatable: true
  objectiveType: Hunt
  runtime:
    spawnPointTags:
    - tag: TradeContractMineSpawn
      weight: 5
    - tag: TradeContractHuntSpawn
      weight: 1
    stageGoal: 1
    targetPrototype: MobMutantFleshAgressive
    proofPrototype: NcTradeContractProofGhoulTrophy
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 50, max: 80 }

# ----------------------------
# Multi-stage repair objective
# ----------------------------
- type: storeContract
  id: trade_contract_repair_generator
  name: "Запустить ржавый генератор"
  description: "В городской торговой зоне стоит заглохший генератор. Проведите три этапа ремонта сваркой, заберите фотоподтверждение выполненной работы и сдайте его к торговому автомату."
  difficulty: Easy
  repeatable: true
  objectiveType: Repair
  runtime:
    spawnPointTags:
    - tag: TradeContractStoreSpawn
      weight: 1
    stageGoal: 3
    structurePrototype: UAZStructureRusted
    proofPrototype: NcTradeContractProofRepairPhoto
    guardPrototype: MobBanditSecurityLow
    guardCount: 2
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
    repairToolQuality: Welding
    repairDoAfterSeconds: 2
    repairStageSound: /Audio/Effects/sparks4.ogg
  rewards:
  - type: Currency
    id: Caps
    amount: { min: 80, max: 120 }

# ----------------------------
# Ghost-role objective
# ----------------------------
- type: storeContract
  id: trade_contract_ghost_raider
  name: "Особая цель: рейдер"
  description: "Сначала подбирается исполнитель. Когда цель объявится в городе, устраните её и доставьте тело к торговому автомату."
  difficulty: Easy
  repeatable: true
  objectiveType: GhostRole
  runtime:
    spawnPointTags:
    - tag: TradeContractStoreSpawn
      weight: 3
    - tag: TradeContractGhostSpawn
      weight: 1
    stageGoal: 1
    ghostRole: nc_contract_ghost_role_raider
    guardPrototype: MobBanditSecurityLow
    guardCount: 2
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
    acceptTimeoutSeconds: 60
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 90, max: 140 }

# ----------------------------
# Legacy single-tag checks
# ----------------------------
- type: storeContract
  id: trade_contract_repair_generator_legacy_store
  name: "Проверка: генератор у магазина"
  description: "Проверочный контракт на старом формате spawnPointTag. Генератор должен появиться в торговой зоне, а после ремонта нужно принести фотоподтверждение."
  difficulty: Easy
  repeatable: true
  objectiveType: Repair
  runtime:
    spawnPointTag: TradeContractStoreSpawn
    stageGoal: 3
    structurePrototype: UAZStructureRusted
    proofPrototype: NcTradeContractProofRepairPhoto
    guardPrototype: MobBanditSecurityLow
    guardCount: 2
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
    repairToolQuality: Welding
    repairDoAfterSeconds: 2
    repairStageSound: /Audio/Effects/sparks4.ogg
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 85, max: 125 }

- type: storeContract
  id: trade_contract_ghost_raider_legacy_store
  name: "Проверка: рейдер по старой схеме"
  description: "Проверочный контракт на старом формате spawnPointTag. Особая цель должна появляться в торговой зоне."
  difficulty: Easy
  repeatable: true
  objectiveType: GhostRole
  runtime:
    spawnPointTag: TradeContractStoreSpawn
    stageGoal: 1
    ghostRole: nc_contract_ghost_role_raider
    guardPrototype: STMobStalkerT4
    guardCount: 2
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
    acceptTimeoutSeconds: 60
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 95, max: 145 }
