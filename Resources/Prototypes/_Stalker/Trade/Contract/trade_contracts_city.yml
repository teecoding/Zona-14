    - type: Pool
      id: ContractRewardEasy

- type: storeContract
  id: trade_contract_delivery_BoxCrate
  name: "Доставить ящик к покупателю"
  description: "Нужно донести ящик к покупателю. Не задавай вопросов."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    targetPrototype: BoxCrateQests
    proofPrototype: NcTradeContractProofDeliveryReceipt
    spawnAtStore: true
    dropoffPointTag: TradeContractDeliveryBolotoEasy
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: BoxCrateQests
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

- type: storeContract
  id: trade_contract_recovery_BoxCrate
  name: "Вернуть ящик с болота"
  description: "Клиент так и не забрал свой груз, а теперь там ошивается стая матерых кабанов. Отправляйся на место, разберись с охраной и притащи ящик обратно к автомату."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    spawnPointTag: TradeContractDeliveryBolotoEasy
    targetPrototype: BoxCrateQests
    allowStoreWorldTurnIn: true
    guardPrototype: MobMutantBoar
    guardCount: 3
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: BoxCrateQests
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardEasy

- type: storeContract
  id: trade_contract_delivery_tracked_copper
  name: "Помеченный медный слиток"
  description: "Один из помеченных слитков потерялся. Найдите его и сдайте именно этот груз."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    spawnPointTags:
    - tag: TradeContractMineSpawn
      weight: 5
    - tag: TradeContractStoreSpawn
      weight: 1
    targetPrototype: STCraftSheetCopperT1
    guardPrototype: MobBanditSecurityLow
    guardCount: 1
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: STCraftSheetCopperT1
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }

# ----------------------------
# Structure delivery to store
# ----------------------------
- type: storeContract
  id: trade_contract_delivery_structure_to_store_crate
  name: "Вывезти стальной ящик с шахты"
  description: "Стальной ящик появится на одной из шахтных грузовых точек. Дотащите его до торгового автомата целым. Если груз уничтожат, заказ будет сорван."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    spawnPointTags:
    - tag: TradeContractMineSpawn
      weight: 5
    - tag: TradeContractStructureSpawn
      weight: 2
    targetPrototype: CrateGenericSteel
    allowStoreWorldTurnIn: true
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: CrateGenericSteel
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 155, max: 290 }

# ----------------------------
# Structure delivery to dropoff
# ----------------------------
- type: storeContract
  id: trade_contract_delivery_structure_to_dropoff_crate
  name: "Доставить стальной ящик на шахту"
  description: "Стальной ящик появится возле торгового автомата. Доставьте его на одну из шахтных точек целым, заберите накладную о приёмке и принесите её обратно за оплатой."
  difficulty: Easy
  repeatable: true
  objectiveType: Delivery
  runtime:
    targetPrototype: CrateGenericSteel
    proofPrototype: NcTradeContractProofDeliveryReceipt
    spawnAtStore: true
    dropoffPointTags:
    - tag: TradeContractMineSpawn
      weight: 4
    - tag: TradeContractStructureDropoff
      weight: 1
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  targets:
  - id: CrateGenericSteel
    required: 1
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 155, max: 290 }

# ----------------------------
# Hunt objective
# ----------------------------
- type: storeContract
  id: trade_contract_hunt_ghoul
  name: "Контракт на устранение"
  description: "В окрестностях заметили опасного мутанта. Найдите цель, устраните её, подберите трофейную метку с тела и принесите её к доске за оплатой."
  difficulty: Easy
  repeatable: true
  objectiveType: Hunt
  runtime:
    spawnPointTags:
    - tag: TradeContractMineSpawn
      weight: 5
    - tag: TradeContractHuntSpawn
      weight: 1
    stageGoal: 1
    targetPrototype: MobMutantFleshAgressive
    proofPrototype: NcTradeContractProofGhoulTrophy
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 50, max: 80 }

- type: storeContract
  id: trade_contract_hunt_old_boar
  name: "Охота на Старого Секача"
  description: "В окрестностях объявился старый секач со своей свитой. Эта тварь терроризирует округу. Заказчик хочет, чтобы ты разобрался с ним. Устрани вожака, разберись с его охраной, а в качестве доказательства принеси трофейную метку с главного кабана."
  difficulty: Medium
  repeatable: true
  objectiveType: Hunt
  runtime:
    spawnPointTag: TradeContractHuntBoarLair
    stageGoal: 1
    targetPrototype: MobMutantBoarOld
    guardPrototype: MobMutantBoar
    guardCount: 3
    proofPrototype: NcTradeContractProofBoarHoof
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 1000, max: 1500 }
  - type: Pool
    amount: { min: 1, max: 2 }
    options:
    - type: Pool
      id: ContractRewardMedium

# ----------------------------
# Multi-stage repair objective
# ----------------------------
- type: storeContract
  id: trade_contract_repair_generator
  name: "Починка"
  description: "Где-то в зоне стоит заглохшая машина. Проведите три этапа ремонта сваркой, заберите фотоподтверждение выполненной работы и сдайте его."
  difficulty: Easy
  repeatable: true
  objectiveType: Repair
  runtime:
    spawnPointTags:
    - tag: TradeContractStoreSpawn
      weight: 1
    stageGoal: 3
    structurePrototype: UAZStructureRusted
    proofPrototype: NcTradeContractProofRepairPhoto
    guardPrototype: MobBanditSecurityLow
    guardCount: 2
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
    repairToolQuality: Welding
    repairDoAfterSeconds: 2
    repairStageSound: /Audio/Effects/sparks4.ogg
  rewards:
  - type: Currency
    id: Caps
    amount: { min: 80, max: 120 }

# ----------------------------
# Ghost-role objective
# ----------------------------
- type: storeContract
  id: trade_contract_ghost_raider
  name: "Особая цель"
  description: "Сначала подбирается исполнитель. Когда цель объявится в городе, устраните её и доставьте тело к торговому автомату."
  difficulty: Easy
  repeatable: true
  objectiveType: GhostRole
  runtime:
    spawnPointTags:
    - tag: TradeContractStoreSpawn
      weight: 3
    - tag: TradeContractGhostSpawn
      weight: 1
    stageGoal: 1
    ghostRole: nc_contract_ghost_role_raider
    guardPrototype: MobBanditSecurityLow
    guardCount: 2
    givePinpointer: true
    pinpointerPrototype: PinpointerUniversal
    acceptTimeoutSeconds: 60
  rewards:
  - type: Currency
    id: Roubles
    amount: { min: 190, max: 340 }

