- type: entity
  id: Trademachine
  abstract: true
  name: Торговый автомат Города
  description: Нужно срочно — он рядом. Выбирай, плати, забирай.
  suffix: vendor, normal
  components:
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: NcStoreStructuredBoundUi
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: true
    noRot: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        density: 300
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    sprite: Structures/Machines/VendingMachines/ammo.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
  - type: PointLight
    radius: 2.5
    energy: 1
    color: "#b34747"
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true

- type: entity
  id: TrademachineCity
  parent: Trademachine
  name: Торговый автомат Города
  description: Нужно срочно — он рядом. Выбирай, плати, забирай.
  suffix: vendor, normal
  components:
  - type: NcStore
    buyPresets:
    - stalker_buy
    sellPresets:
    - stalker_sell
    contractPresets:
    - PresetBazar

