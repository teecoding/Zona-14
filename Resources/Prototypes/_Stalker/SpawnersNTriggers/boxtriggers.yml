# Shon`s triggers - Start

- type: entity
  id: TriggerBoxDrawer
  name: trigger-drawer
  description: trigger-drawer-desk
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    drawdepth: Overdoors
    sprite: /Textures/_Stalker/Objects/Decoration/LotOfBoxes.rsi
    state: 1
  - type: UseDelay
    delay: 5
  - type: SignalSwitch
    onPort: Pressed
    offPort: Pressed
    statusPort: Pressed
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-2.28125,-1.078125,2.28125,1.078125"
        density: 155
        mask:
        - MachineMask
        layer:
        - WallLayer
  - type: Physics
  - type: DeviceNetwork
    deviceNetId: Wireless
  - type: WirelessNetworkConnection
    range: 99999
  - type: DeviceLinkSource
    ports:
      - Pressed
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

# Shon`s triggers - End

# Shon`s spawners - Start

- type: entity
  id: BoxDrawer
  name: box-drawer
  description: box-drawer-desk
  placement:
    mode: SnapgridCenter
  components:
  - type: Marker
  - type: Sprite
    sprite: Markers/jobs.rsi
    snapCardinals: true
    layers:
      - state: green
  - type: SpawnOnTrigger
    proto: RandomBoxDrawerSpawner
  - type: TriggerOnSignal
  - type: DeviceLinkSink
    ports:
    - Trigger

- type: entityTable
  id: RandomBoxDrawerTable
  table: !type:GroupSelector
    children:
    - id: BoxCrate
    - id: WoodenBox0
    - id: WoodenBox1
    - id: WoodenBox1a2
    - id: WoodenBox2
    - id: WoodenBox3
    - id: WoodenBox4
    - id: WoodenBox5
    - id: WoodenBox6
    - id: WoodenBox7
    - id: WoodenBox8
    - id: WoodenBox9
    - id: WoodenYaschik1
    - id: WoodenYaschik2
    - id: WoodenYaschik3
    - id: WoodenYaschik4
    - id: WoodenYaschik5
    - id: WoodenBoxWithLoot
    - id: CartonBoxWithLoot1
    - id: CartonBoxWithLoot2
    - id: CartonBoxWithLoot3

- type: entity
  id: RandomBoxDrawerSpawner
  name: random box drawer spawner
  parent: MarkerBase
  suffix: ST
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomBoxDrawerTable
    offset: 0.0

# Shon`s spawners - End