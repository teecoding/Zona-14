- type: entity
  parent: NPCDoll
  id: NPCRadioPlayerZONA
  name: Radio Amateur [→   ←]
  description: He is engaged in the design, construction, modification and use of radio engineering and electronic devices. He loves everything related to the Soviet Union. He tries to be secretive.
  suffix: ST, Music, ZONA-TRADER
  components:
  - type: Sprite
    sprite: _Stalker/NPC/RadioPlayer.rsi
    state: radioplayer
  - type: Physics
    bodyType: Static
  - type: DatasetVocalizer
    dataset: NPCStalkerTraderAds
  - type: ActivatableUI
    key: enum.ShopUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.ShopUiKey.Key:
        type: ShopBoundUserInterface
  - type: Shop
    moneyId: Roubles
    shopPresetId: NpcRadioPlayerZONA
  - type: TypingIndicator
    proto: robot
  - type: TTS # Corvax-TTS
    voice: TrainingRobot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Alto
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
    - Common

