#By Noguchi.47
- type: entity
  name: TOZ-106
  parent: STBaseWeaponShotgunAuto
  suffix: ST
  id: STBaseWeaponShotgunTOZ106
  description: A single-barreled 20 gauge hunting shotgun with a sliding breech bolt. Widely known by it vernacular name, the Death of the Chairman, for its compact size. 
  components:
  - type: STWeight
    self: 2.7
  - type: Clothing
    sprite: _Stalker_EN/Objects/Weapons/Guns/Shotguns/TOZ_106.rsi
  - type: Item
    sprite: _Stalker_EN/Objects/Weapons/Guns/Shotguns/TOZ_106.rsi
  - type: Sprite
    scale: 0.75, 0.75
    sprite: _Stalker_EN/Objects/Weapons/Guns/Shotguns/TOZ_106.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    soundGunshot:
      path: /Audio/_Stalker_EN/Effects/Guns/TOZ106_shoot.ogg
    angleIncrease: 15
    angleDecay: 60
    fireRate: 0.8
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Base2070Mag
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 3
        whitelist:
          tags:
          - MagazineTOZ106
      gun_chamber:
        name: Chamber
        startingItem: Cartridge62mmBuckshot
        priority: 2
        whitelist:
          tags:
          - ShellTOZ106
      gun_module_muzzle:
        name: Muzzle
        priority: 1
        whitelist:
          tags:
          - STWeaponModuleShotgunChoke
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot {}
      gun_chamber: !type:ContainerSlot {}
      gun_module_muzzle: !type:ContainerSlot {}
