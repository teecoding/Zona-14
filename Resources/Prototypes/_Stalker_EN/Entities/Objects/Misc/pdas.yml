- type: entity
  parent: BaseStalkerPDAEN
  id: STRuggedPdaEN
  name: Rugged PDA
  suffix: ST, PDA
  description: A PDA modified for use in dangerous areas of the zone, it has all the utilities needed to survive in harsh environments.
  components:
  - type: Icon
    state: rugged_off
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        rugged_on
  - type: PdaBorderColor
    borderColor: "#61614F"
  - type: Pda
    penSlot:
      startingItem: Pen
      priority: 1
      whitelist:
        tags:
        - Write
  - type: ItemSlots
    slots:
      cassette_slot:
        name: Cassete
        priority: 2
        whitelist:
          tags:
            - Cassete
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
      dogtag_slot:
        name: Dogtag
        whitelist:
          tags:
            - Dogtag
  - type: HealthAnalyzer
    scanDelay: 2
    scanningEndSound:
      path: "/Audio/Items/Medical/healthscanner.ogg"
  - type: Boombox
  - type: HandheldGPS
  - type: PointLight
    enabled: false
    radius: 7
    energy: 3.5
    netsync: false

