- type: entity
  abstract: true
  parent: BaseStalkerPDA
  id: BaseStalkerPDAEN
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "mpda_on"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Icon
    sprite: _Stalker_EN/Objects/Devices/pda.rsi
    state: mpda_off
  - type: Item
    sprite: _Stalker_EN/Objects/Devices/pda.rsi
    storedRotation: -90
    size: Small

- type: entity
  parent: BaseStalkerPDAEN
  id: MercPDA
  name: Mercenary's PDA
  description: It's connected to the common network to allow communication; it also has a built in cassette player.
  components:
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       merc_on
  - type: PdaBorderColor
    borderColor: "#12213a"
  - type: Icon
    sprite: _Stalker_EN/Objects/Devices/pda.rsi
    state: merc_off
  - type: Pda # stalker-en-changes-start
    penSlot:
      startingItem: Pen
      priority: 1
      whitelist:
        tags:
        - Write
  - type: Boombox
  - type: ItemSlots
    slots:
      cassette_slot:
        name: Cassete
        priority: 2
        whitelist:
          tags:
            - Cassete
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmall
      dogtag_slot:
        name: Dogtag
#        startingItem: ClothingNeckDogtagBrigand
        whitelist:
          tags:
          - Dogtag
  - type: PointLight
    enabled: false
    radius: 5
    energy: 2.5
    netsync: false # stalker-en-changes-end

# Militaries

- type: entity
  parent: BaseStalkerPDAEN
  id: STVoenPdaEN
  name: Military PDA
  suffix: Voenstals
  description: A secure, encrypted device designed for field communication, mission management, and data collection. Built with reinforced casing to withstand radiation, rumored to withstand a nuclear blast.
  components:
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       mpda_on
  - type: Unremoveable
  - type: PdaBorderColor
    borderColor: "#285714"
  - type: Pda # stalker-en-changes-start
    penSlot:
      startingItem: Pen
      priority: 1
      whitelist:
        tags:
        - Write
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmall
      dogtag_slot:
        name: Dogtag
        startingItem: ClothingNeckDogtagOfficial
        whitelist:
          tags:
          - Dogtag
  - type: Armor
    armorClass: 0
    modifiers:
      flatReductions:
        Radiation: 2
        Psy: 2
  - type: PointLight
    enabled: false
    radius: 5
    energy: 2.5
    netsync: false # stalker-en-changes-end

