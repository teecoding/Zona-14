- type: entity
  parent: [DrinkVisualsAllFilled, DrinkBottleGlassBaseFull]
  id: DrinkCossackVodkaBottleFull
  name: cossacks vodka bottle
  description: Vodka popular in the zone, it takes the edge and some of the radiation off.
  suffix: ST
  components:
  - type: Trash
    time: 300
  - type: STWeight
    self: 0.8
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: CossackVodka
          Quantity: 100
  - type: Label
    currentLabel: reagent-name-vodka
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Drinks/cossackvodka.rsi
  - type: Item
    sprite: _Stalker_EN/Objects/Consumable/Drinks/cossackvodka.rsi
  - type: Sealable

- type: entity
  parent: [DrinkBottleGlassBaseFull, DrinkVisualsAllFilled]
  id: STDrinkYevishWineBottleFull
  name: поварское вино
  description: Этикетка немного неаккуратная и явно напечатана вручную, но само вино превосходное и явно создано человеком, который посвятил себя созданию напитка, достойного внимания.
  suffix: ST, Food
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Wine
          Quantity: 90
  - type: Label
    currentLabel: reagent-name-wine
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Drinks/yevish_wine.rsi
    layers:
    - state: icon_empty
      map: [ "enum.OpenableVisuals.Layer" ]
    - state: fill-5
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    inHandsFillBaseName: null
  - type: FitsInDispenser
    solution: drink
  - type: Tag
    tags:
    - Wine
    - DrinkBottle

- type: entity
  parent: [ DrinkBaseMaterialGlass, DrinkBase, DrinkBaseOpenable, DrinkVisualsOpenable, DrinkVisualsFillOverlay ]
  id: STDrinkJar
  name: банка
  description: Старая банка.
  suffix: ST
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Drinks/jar.rsi
    scale: 0.7,0.7
    layers:
    - state: icon
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: fill-1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
    - state: icon-front
      map: [ "enum.SolutionContainerLayers.Overlay" ]
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    fillBaseName: fill-
    inHandsMaxFillLevels: 3
    inHandsFillBaseName: -fill-
  - type: ExaminableSolution
    examinableWhileClosed: true
    heldOnly: false
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: Tag
    tags:
    - DrinkBottle
  - type: Craftable

