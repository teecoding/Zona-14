- type: entity
  parent: FactionFlagBaseEN
  id: FactionFlagVoenstal
  name: STVoenstalFlag
  suffix: ST, Mapping, Flags, Voenstal
  components:
  - type: Sprite
    sprite: _Stalker_EN/Structures/Wallmounts/faction_flags.rsi
    state: voenflag

- type: entity
  parent: FactionFlagBaseEN
  id: FactionFlagMonolith
  name: STVoenstalFlag
  suffix: ST, Mapping, Flags, Monolith
  components:
  - type: Sprite
    sprite: _Stalker_EN/Structures/Wallmounts/faction_flags.rsi
    state: mono
  - type: Construction
    graph: FlagMonoCraft
    node: flagmonoend

- type: entity
  parent: PosterBaseStalker
  id: FactionFlagBaseEN
  name: flag base
  abstract: true
  components:
  - type: Appearance
  - type: Flammable
    fireSpread: false
    alwaysCombustible: true
    damage:
      types:
        Heat: 1
  - type: FireVisuals
    sprite: /Textures/_Stalker_EN/Effects/fire.rsi
    normalState: fire
  - type: Damageable
    damageModifierSet: Web
  - type: Destructible # TODO: a destroyed entity for every flag type, offset one tile down so it doesnt spawn on walls
    thresholds:
    - trigger: # Excess damage, don't spawn entities
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 15
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Craftable
