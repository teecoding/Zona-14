# Default faction relations matrix for the Zone.
# Relations not listed here default to Neutral.
# Pairs are always stored with factionA < factionB alphabetically.
- type: stFactionRelationDefaults
  id: Default
  factions:
    - Loners
    - Freedom
    - Bandits
    - Duty
    - Ecologist
    - Monolith
    - ClearSky
    - Renegades
  bandMapping:
    Stalker: Loners
    Freedom: Freedom
    Bandits: Bandits
    Dolg: Duty
    Scientists: Ecologist
    Monolith: Monolith
    "Clear Sky": ClearSky
    Renegades: Renegades
  relations:
    # Loners relations
    - factionA: Bandits
      factionB: Loners
      relation: Hostile
    - factionA: Loners
      factionB: Monolith
      relation: War
    - factionA: Loners
      factionB: Renegades
      relation: War

    # Freedom relations
    - factionA: Duty
      factionB: Freedom
      relation: War
    - factionA: Freedom
      factionB: Monolith
      relation: War
    - factionA: Freedom
      factionB: Renegades
      relation: Hostile

    # Bandits relations
    - factionA: Bandits
      factionB: Duty
      relation: War
    - factionA: Bandits
      factionB: Ecologist
      relation: Hostile
    - factionA: Bandits
      factionB: Monolith
      relation: War
    - factionA: Bandits
      factionB: ClearSky
      relation: Hostile
    - factionA: Bandits
      factionB: Renegades
      relation: Hostile

    # Duty relations
    - factionA: Duty
      factionB: Monolith
      relation: War
    - factionA: Duty
      factionB: Renegades
      relation: War

    # Ecologist relations
    - factionA: Ecologist
      factionB: Monolith
      relation: War
    - factionA: Ecologist
      factionB: Renegades
      relation: War

    # Monolith relations
    - factionA: ClearSky
      factionB: Monolith
      relation: War
    - factionA: Monolith
      factionB: Renegades
      relation: War

    # ClearSky relations
    - factionA: ClearSky
      factionB: Renegades
      relation: War
