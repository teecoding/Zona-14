# Default faction relations matrix for the Zone.
# Relations are changed in-game through Igor NPCs or admin commands.
# DB overrides persist across rounds.
- type: stFactionRelationDefaults
  id: Default
  factions:
    - Loners
    - Freedom
    - Bandits
    - Duty
    - Ecologist
    - Neutrals
    - Mercenaries
    - Military
    - Monolith
    - ClearSky
    - Renegades
    - Rookies
    - Journalists
    - UN
    - Seraphims
  bandMapping:
    Stalker: Loners
    Freedom: Freedom
    Bandits: Bandits
    Dolg: Duty
    Scientists: Ecologist
    Neutral: Neutrals
    Mercenaries: Mercenaries
    Military: Military
    Monolith: Monolith
    "Clear Sky": ClearSky
    Renegades: Renegades
    Journalists: Journalists
    UN: UN
    Seraphims: Seraphims
  factionGroups:
    Loners:
      - Rookies
      - Neutrals
      - Journalists
  restrictedFactions:
    - Loners
    - Monolith
  hiddenFactions:
    - Journalists
    - UN
  displayNames:
    ClearSky: Clear Sky
  # Pairwise relation transitions players cannot initiate. Pair order is ignored.
  # Admin commands bypass these restrictions.
  # Note: if a faction is also in `restrictedFactions`, that all-or-nothing lock wins;
  # these entries act as self-documentation and a fallback if the faction is removed
  # from `restrictedFactions` later.
  relationRestrictions:
    # Monolith zealots do not negotiate: only War is a legal relation with them.
    - { factionA: Monolith, factionB: Loners,      forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Freedom,     forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Bandits,     forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Duty,        forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Ecologist,   forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Mercenaries, forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Military,    forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: ClearSky,    forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Renegades,   forbidden: [Alliance, Neutral, Hostile] }
    - { factionA: Monolith, factionB: Seraphims,   forbidden: [Alliance, Neutral, Hostile] }
    # Bandits!
    - { factionA: Bandits, factionB: Military,   forbidden: [ Alliance, Neutral, Hostile ] }
    - { factionA: Bandits, factionB: Ecologist,   forbidden: [ Alliance, Neutral ] }
    - { factionA: Bandits, factionB: Duty,   forbidden: [ Alliance, Neutral, Hostile ] }
    # Renegades
    - { factionA: Renegades, factionB: Duty, forbidden: [ Alliance, Neutral, Hostile ] }
    - { factionA: Renegades, factionB: Ecologist, forbidden: [ Alliance, Neutral ] }
    - { factionA: Renegades, factionB: ClearSky, forbidden: [ Alliance, Neutral, Hostile ] }
    - { factionA: Renegades, factionB: Military, forbidden: [ Alliance, Neutral, Hostile ] }
    # Duty
    - { factionA: Duty, factionB: Freedom, forbidden: [ Alliance, Neutral, Hostile ] }
  relations:
    # MONOLITH
    - { factionA: Monolith, factionB: Loners, relation: War }
    - { factionA: Monolith, factionB: Freedom, relation: War }
    - { factionA: Monolith, factionB: Bandits, relation: War }
    - { factionA: Monolith, factionB: Duty, relation: War }
    - { factionA: Monolith, factionB: Ecologist, relation: War }
    - { factionA: Monolith, factionB: Mercenaries, relation: War }
    - { factionA: Monolith, factionB: Military, relation: War }
    - { factionA: Monolith, factionB: ClearSky, relation: War }
    - { factionA: Monolith, factionB: Renegades, relation: War }
    - { factionA: Monolith, factionB: Seraphims, relation: War }
    # Loners relations
    - { factionA: Loners, factionB: Bandits, relation: Hostile }
    - { factionA: Loners, factionB: Renegades, relation: Hostile }
    # Freedom relations
    - { factionA: Freedom, factionB: Duty, relation: War }
    - { factionA: Freedom, factionB: Renegades, relation: Hostile }
    # Bandits relations
    - { factionA: Bandits, factionB: Duty, relation: War }
    - { factionA: Bandits, factionB: Ecologist, relation: Hostile }
    - { factionA: Bandits, factionB: Military, relation: War }
    - { factionA: Bandits, factionB: ClearSky, relation: War }
    - { factionA: Bandits, factionB: Renegades, relation: Hostile }
    # Duty relations
    - { factionA: Duty, factionB: Ecologist, relation: Hostile }
    - { factionA: Duty, factionB: Mercenaries, relation: Hostile }
    - { factionA: Duty, factionB: Military, relation: Hostile }
    - { factionA: Duty, factionB: ClearSky, relation: Hostile }
    - { factionA: Duty, factionB: Renegades, relation: War }
    # Ecologist relations
    - { factionA: Ecologist, factionB: Mercenaries, relation: Hostile }
    - { factionA: Ecologist, factionB: Military, relation: Alliance }
    - { factionA: Ecologist, factionB: Renegades, relation: Hostile }
    # Mercenaries relations
    - { factionA: Mercenaries, factionB: Military, relation: Hostile }
    - { factionA: Mercenaries, factionB: ClearSky, relation: Hostile }
    - { factionA: Mercenaries, factionB: Renegades, relation: Hostile }
    # Military relations
    - { factionA: Military, factionB: ClearSky, relation: Hostile }
    - { factionA: Military, factionB: Renegades, relation: War }
    # ClearSky relations
    - { factionA: ClearSky, factionB: Renegades, relation: War }
    # Seraphims relations
    - { factionA: Seraphims, factionB: Renegades, relation: War }
    - { factionA: Seraphims, factionB: Duty, relation: Hostile }
    - { factionA: Seraphims, factionB: Freedom, relation: War }
