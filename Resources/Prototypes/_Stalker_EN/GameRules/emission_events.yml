- type: entity
  id: STEmissionEventScheduler
  parent: BaseGameRule
  components:
  - type: STEmissionEventSchedulerRule
    minimumTimeUntilFirstEvent: 7200
    minMaxEventTiming:
      min: 7200
      max: 14400
    scheduledGameRule: STEmissionEvent

- type: entity
  parent: BaseGameRule
  id: STEmissionEvent
  categories: [ HideSpawnMenu ]
  components:
  - type: StationEvent
    earliestStart: 0
    reoccurrenceDelay: 0
    duration: 360
    weight: 100
  - type: EmissionEventRule
    mainAmbientDelay: 30
    stage2Delay: 60
    redHueDelay: 100
    damageStartDelay: 100
    redHueBeforeEndDelay: 290
    damageEndDelay: 310
    damageInterval: 3

    damage:
      types:
        Psy: 50

    shakeStrength: 50
    primaryEmissionColor: "#FF0000FF"
    secondaryEmissionColor: "#FF5112"

    announcementSender: "Сеть S.T.A.L.K.E.R."
    announcementStage1: "Внимание, сталкеры! Приближается выброс. Повторяю: приближается выброс. Немедленно ищите укрытие."
    announcementStage2: "Внимание, сталкеры! Выброс начнётся с минуты на минуту. Ищите укрытие, если хотите выжить."
    announcementStage3: "Сталкеры, выброс завершился. Надеюсь, вы все уцелели."

    rainStartBeforeEnd: 40
    rainDurationMin: 360
    rainDurationMax: 600
    rainWeather: STStorm

    lightningSpawnRadius: 17.5
    lightningIntervalRange: 4, 15
    lightningEffectProtoId: EmissionLightningEffect
  - type: EmissionAnomalyRegen
    deletionDelay: 30
    deletionStaggerInterval: 5
    regenerationDelay: 10
    regenerationStaggerInterval: 15

- type: entity
  parent: STEmissionEvent
  id: STEmissionEventDebug
  categories: [ HideSpawnMenu ]
  components:
  - type: EmissionEventRule
    mainAmbientDelay: 4
    stage2Delay: 8
    redHueDelay: 15
    damageStartDelay: 15
    redHueBeforeEndDelay: 30
    damageEndDelay: 50
  - type: EmissionAnomalyRegen
    deletionDelay: 5
    deletionStaggerInterval: 1
    regenerationDelay: 3
    regenerationStaggerInterval: 3